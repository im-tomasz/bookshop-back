api_platform:
    formats: 
        jsonld:
            mime_types: ['application/ld+json']
        json:
            mime_types: ['application/json']
    swagger:
        api_keys:
            JWT:
                name: Authorization
                type: header
    title: Hello API Platform
    version: 1.0.0
    defaults:
        stateless: true
        cache_headers:
            vary: ['Content-Type', 'Authorization', 'Origin']
